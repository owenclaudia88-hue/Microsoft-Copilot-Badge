<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Badge Verification</title>

<style>

body{
font-family:Arial;
background:#f4f6fb;
padding:40px;
}

.card{
background:white;
padding:40px;
border-radius:16px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
max-width:700px;
margin:auto;
}

.valid{
color:#2e7d32;
font-weight:bold;
margin-top:20px;
}

.row{
margin:10px 0;
}

</style>

</head>

<body>

<div class="card">

<h1>Badge Verification</h1>

<div class="row">
<b>Status:</b> Valid
</div>

<div class="row">
<b>Badge:</b> Microsoft Copilot Chat apmācības publiskajam sektoram | MS-4023
</div>

<div class="row">
<b>Issued by:</b> Bittnet Training
</div>

<div class="row">
<b>Technology Partner:</b> Microsoft
</div>

<div class="row">
<b>Year:</b> 2026
</div>

<div class="row">
<b>Certificate ID:</b>
<span id="cert"></span>
</div>

<p class="valid">
This credential has been issued by Bittnet Training.
</p>

</div>

<script>

const params = new URLSearchParams(window.location.search)

const certID = params.get("id")

document.getElementById("cert").innerText = certID

</script>

</body>

</html>
